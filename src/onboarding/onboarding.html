<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome — YouTube Interest Filter</title>
    <link rel="stylesheet" href="onboarding.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <div class="logo">▶</div>
        <h1>Make YouTube about <em>your</em> interests</h1>
        <p class="sub">
          Pick the topics you care about. Your homepage, search, and sidebar will
          show <strong>only</strong> matching videos — Shorts and ads removed.
        </p>
      </header>

      <section class="picker">
        <div class="picker-head">
          <h2>Pick your interests</h2>
          <span id="counter" class="counter" aria-live="polite"></span>
        </div>
        <div id="packGrid" class="pack-grid"></div>
      </section>

      <footer class="actions">
        <button id="startBtn" class="btn primary">Show me my feed →</button>
        <button id="skipBtn" class="btn ghost">Skip — I'll set it up later</button>
        <p class="fineprint">You can change everything anytime from the extension's settings. Everything stays on this device.</p>
      </footer>
    </main>

    <script src="../shared/matcher.js"></script>
    <script src="../shared/defaults.js"></script>
    <script src="../data/interest-packs.js"></script>
    <script src="onboarding.js"></script>
  </body>
</html>
